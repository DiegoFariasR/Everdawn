name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Everdawn.slnx

      - name: Build
        run: dotnet build Everdawn.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Everdawn.slnx --no-build --configuration Release --verbosity normal

      - name: Format check
        run: dotnet format Everdawn.slnx --verify-no-changes --verbosity diagnostic

      # Validates that GameCore stays compilable under a Unity-safe C# language level.
      # Unity 6 (6000.x) compiles GameCore via its Roslyn toolchain at approximately C# 10.
      # ImplicitUsings is disabled to simulate Unity's direct .cs compilation: Unity never
      # reads the SDK-generated implicit-usings file in obj/, so every namespace must be
      # declared explicitly in GlobalUsings.cs.  Catching both constraints here means a
      # contributor cannot accidentally introduce C# 11+ syntax or an undeclared namespace
      # without CI failing before the code reaches the Unity package.
      - name: Unity compat check (LangVersion 10, no implicit usings)
        run: dotnet build GameCore/GameCore.csproj --no-restore --configuration Release -p:LangVersion=10 -p:ImplicitUsings=disable
