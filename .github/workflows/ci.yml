name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Everdawn.slnx

      - name: Build
        run: dotnet build Everdawn.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Everdawn.slnx --no-build --configuration Release --verbosity normal --filter "Category!=Balancing"

      - name: Format check
        run: dotnet format Everdawn.slnx --verify-no-changes --verbosity diagnostic

      # Validates that GameCore stays compilable under a Unity-safe C# language level.
      # GameCore targets netstandard2.1 and C# 9 (LangVersion=9).
      # C# 9 is the highest version supported without introducing C# 10 conveniences
      # (file-scoped namespaces, global using directives) that break Unity's Roslyn
      # toolchain, which compiles .cs files directly without reading SDK-generated files.
      # ImplicitUsings is disabled to enforce that every namespace is declared explicitly
      # in each source file — Unity never reads the SDK obj/ implicit-usings file.
      # This step fails if someone reintroduces file-scoped namespaces, global usings,
      # C# 10+ syntax, or any namespace that relies on hidden SDK-generated imports.
      - name: Unity compat check (LangVersion 9, no implicit usings)
        run: dotnet build GameCore/GameCore.csproj --no-restore --configuration Release -p:LangVersion=9 -p:ImplicitUsings=disable
