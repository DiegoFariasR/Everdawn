name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Everdawn.slnx

      - name: Build
        run: dotnet build Everdawn.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Everdawn.slnx --no-build --configuration Release --verbosity normal

      - name: Format check
        run: dotnet format Everdawn.slnx --verify-no-changes --verbosity diagnostic
