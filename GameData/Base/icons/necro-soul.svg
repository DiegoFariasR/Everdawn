<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e0818" stroke="#5500aa" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#330066" stroke-width="1" opacity="0.6"/>
  <!-- Ghost glow aura -->
  <ellipse cx="32" cy="30" rx="20" ry="24" fill="#2a0050" opacity="0.5"/>
  <!-- Ghost body: rounded top + wavy bottom hem (3 bumps) -->
  <path d="M 14,30
           Q 14,8 32,8
           Q 50,8 50,30
           L 50,50
           Q 46,44 42,50
           Q 38,56 34,50
           Q 30,44 32,50
           Q 30,56 26,50
           Q 22,44 18,50
           Q 14,44 14,50
           Z"
        fill="#4a2a70" stroke="#9575cd" stroke-width="1.5"/>
  <!-- Inner ghost highlight (lighter top portion) -->
  <path d="M 18,30 Q 18,12 32,12 Q 46,12 46,30 L 46,36 Q 40,32 32,32 Q 24,32 18,36 Z"
        fill="#6a3a9a" opacity="0.5"/>
  <!-- Two hollow eye sockets  -->
  <ellipse cx="25" cy="28" rx="5"   ry="6"   fill="#0a0520"/>
  <ellipse cx="39" cy="28" rx="5"   ry="6"   fill="#0a0520"/>
  <!-- Glowing pupils (void purple) -->
  <ellipse cx="25" cy="29" rx="2.5" ry="3"   fill="#7b1fa2" opacity="0.9"/>
  <ellipse cx="39" cy="29" rx="2.5" ry="3"   fill="#7b1fa2" opacity="0.9"/>
  <circle  cx="24" cy="28" r="1"    fill="#e040fb" opacity="0.7"/>
  <circle  cx="38" cy="28" r="1"    fill="#e040fb" opacity="0.7"/>
  <!-- Floating sparkle particles -->
  <circle cx="12" cy="18" r="1.5" fill="#ce93d8" opacity="0.6"/>
  <circle cx="52" cy="14" r="1.2" fill="#ba68c8" opacity="0.5"/>
  <circle cx="54" cy="30" r="1.5" fill="#ce93d8" opacity="0.6"/>
  <circle cx="10" cy="38" r="1"   fill="#9c27b0" opacity="0.5"/>
  <circle cx="22" cy="12" r="1"   fill="#e040fb" opacity="0.4"/>
  <circle cx="44" cy="10" r="1.2" fill="#ce93d8" opacity="0.4"/>
</svg>
