<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#1a0808" stroke="#882222" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#5a1010" stroke-width="1" opacity="0.6"/>
  <!-- Large hourglass (nearly empty top) -->
  <rect x="16" y="8"  width="32" height="6" rx="2" fill="#607d8b" stroke="#90a4ae" stroke-width="1"/>
  <rect x="16" y="50" width="32" height="6" rx="2" fill="#607d8b" stroke="#90a4ae" stroke-width="1"/>
  <path d="M 18,14 L 46,14 L 36,32 L 46,50 L 18,50 L 28,32 Z" fill="#1a2030" stroke="#455a64" stroke-width="1.2"/>
  <!-- Top sand nearly gone -->
  <path d="M 19,14 L 29,14 L 31,20 L 23,20 Z" fill="#cf6679" opacity="0.4"/>
  <!-- Full bottom (sand accumulated) -->
  <path d="M 20,50 L 44,50 L 42,42 L 36,42 L 36,36 L 28,36 L 28,42 L 22,42 Z" fill="#c2185b" opacity="0.7"/>
  <!-- Wavy slow lines beside hourglass -->
  <path d="M 52,22 Q 56,26 52,30 Q 56,34 52,38" fill="none" stroke="#ef9a9a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 56,24 Q 60,28 56,32 Q 60,36 56,40" fill="none" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Cobweb (stopped, stuck) -->
  <path d="M 8,24 Q 12,28  8,32 Q  12,36  8,40" fill="none" stroke="#78909c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
