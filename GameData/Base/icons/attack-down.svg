<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#1a0808" stroke="#882222" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#5a1010" stroke-width="1" opacity="0.6"/>
  <!-- Downward arrow (weakened) -->
  <polygon points="32,58 44,40 38,40 38,20 26,20 26,40 20,40" fill="#b71c1c" stroke="#ef5350" stroke-width="1.5"/>
  <!-- Broken sword (crack through it) -->
  <line x1="18" y1="48" x2="46" y2="20" stroke="#ef5350" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="48" x2="46" y2="20" stroke="#ffcdd2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Break gap -->
  <line x1="30" y1="36" x2="32" y2="31" stroke="#1a0808" stroke-width="5" stroke-linecap="round"/>
  <line x1="32" y1="37" x2="34" y2="33" stroke="#1a0808" stroke-width="3" stroke-linecap="round"/>
  <!-- Crossguard on broken sword -->
  <line x1="22" y1="43" x2="34" y2="32" stroke="#c62828" stroke-width="6" stroke-linecap="round"/>
  <!-- Down arrow sparkles (dim) -->
  <line x1="48" y1="50" x2="54" y2="56" stroke="#ef9a9a" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="52" y1="46" x2="58" y2="50" stroke="#ef9a9a" stroke-width="1"   stroke-linecap="round" opacity="0.4"/>
</svg>
