<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Hourglass frame -->
  <rect x="18" y="8"  width="28" height="5" rx="2" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <rect x="18" y="51" width="28" height="5" rx="2" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <!-- Hourglass glass body -->
  <path d="M 20,13 L 44,13 L 36,32 L 44,51 L 20,51 L 28,32 Z" fill="#263238" stroke="#546e7a" stroke-width="1.2"/>
  <!-- Upper sand (mostly empty â€” focused) -->
  <path d="M 21,13 L 32,13 L 30,22 L 23,22 L 21,13 Z" fill="#ffa000" opacity="0.5"/>
  <!-- Neck with active falling sand -->
  <line x1="32" y1="30" x2="32" y2="38" stroke="#ffa000" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Lower sand (accumulating) -->
