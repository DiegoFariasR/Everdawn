  <line x1="26" y1="32" x2="22" y2="32" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="32" x2="42" y2="32" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="26" x2="32" y2="22" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
