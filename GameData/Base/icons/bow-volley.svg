<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Small bow on left -->
  <path d="M 12,14 Q 4,32 12,52" fill="none" stroke="#8d6e63" stroke-width="4" stroke-linecap="round"/>
  <line x1="12" y1="14" x2="12" y2="52" stroke="#cfd8dc" stroke-width="1.2"/>
  <rect x="10" y="29" width="4" height="6" rx="1" fill="#6d4c41"/>
  <!-- Three arrows at different angles (volley) -->
  <!-- Arrow top (going upper-right) -->
  <line x1="12" y1="24" x2="46" y2="12" stroke="#a1887f" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="50,10 40,10 44,16" fill="#90a4ae"/>
  <line x1="10" y1="22" x2="8"  y2="18" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="22" x2="14" y2="18" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrow middle (straight right) -->
  <line x1="12" y1="33" x2="46" y2="33" stroke="#a1887f" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="50,33 42,29 42,37" fill="#90a4ae"/>
  <line x1="10" y1="31" x2="8"  y2="29" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="35" x2="8"  y2="37" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrow bottom (going lower-right) -->
  <line x1="12" y1="44" x2="46" y2="56" stroke="#a1887f" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="50,58 42,52 46,58" fill="#90a4ae"/>
  <line x1="10" y1="46" x2="8"  y2="48" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="46" x2="14" y2="50" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
