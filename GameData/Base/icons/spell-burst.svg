<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#1a0800" stroke="#aa4400" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#662200" stroke-width="1" opacity="0.6"/>
  <!-- Impact flash point (upper right quadrant, hitting a target) -->
  <!-- Jagged explosion polygon -->
  <polygon points="32,14 38,22 48,18 42,28 56,30 44,34 52,44 40,40 38,54 32,42 26,54 24,40 12,44 20,34 8,30 22,28 16,18 26,22"
           fill="#bf360c" stroke="#ff6d00" stroke-width="1" opacity="0.8"/>
  <!-- Brighter inner zone -->
  <polygon points="32,20 36,26 44,22 40,30 50,32 40,36 46,44 36,40 34,50 32,40 30,50 28,40 18,44 24,36 14,32 24,30 20,22 28,26"
           fill="#e64a19" opacity="0.7"/>
  <!-- Hot center -->
  <circle cx="32" cy="32" r="9"  fill="#ff6d00"/>
  <circle cx="32" cy="32" r="5"  fill="#ff9100"/>
  <circle cx="32" cy="32" r="2.5" fill="#ffd740"/>
  <!-- Outer shock ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ff6d00" stroke-width="1.5" opacity="0.3"/>
</svg>
