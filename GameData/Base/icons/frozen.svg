<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#060e1a" stroke="#1565c0" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#0d3060" stroke-width="1" opacity="0.6"/>
  <!-- 6-pointed snowflake -->
  <!-- Main 3-bar cross -->
  <line x1="32" y1="6"  x2="32" y2="58" stroke="#90caf9" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="58" y2="32" stroke="#90caf9" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="11" y1="11" x2="53" y2="53" stroke="#90caf9" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="53" y1="11" x2="11" y2="53" stroke="#90caf9" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Barbs on each arm (at 1/3 from tip) -->
  <!-- Top arm barbs -->
  <line x1="32" y1="17" x2="26" y2="12" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="17" x2="38" y2="12" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom arm barbs -->
  <line x1="32" y1="47" x2="26" y2="52" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="47" x2="38" y2="52" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Left arm barbs -->
  <line x1="17" y1="32" x2="12" y2="26" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="17" y1="32" x2="12" y2="38" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm barbs -->
  <line x1="47" y1="32" x2="52" y2="26" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="47" y1="32" x2="52" y2="38" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Center crystal -->
  <circle cx="32" cy="32" r="6" fill="#0d47a1" stroke="#90caf9" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="3" fill="#bbdefb"/>
  <circle cx="31" cy="31" r="1" fill="#ffffff" opacity="0.8"/>
</svg>
