<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Handle -->
  <rect x="30" y="32" width="5" height="24" rx="2" fill="#6d4c41" stroke="#4e342e" stroke-width="0.8"/>
  <line x1="31" y1="38" x2="34" y2="38" stroke="#4e342e" stroke-width="1.2"/>
  <line x1="31" y1="44" x2="34" y2="44" stroke="#4e342e" stroke-width="1.2"/>
  <line x1="31" y1="50" x2="34" y2="50" stroke="#4e342e" stroke-width="1.2"/>
  <!-- Pommel -->
  <ellipse cx="32" cy="58" rx="6" ry="4" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <ellipse cx="32" cy="57" rx="3" ry="2" fill="#546e7a"/>
  <!-- Collar -->
  <rect x="27" y="29" width="11" height="5" rx="1.5" fill="#90a4ae" stroke="#b0bec5" stroke-width="0.8"/>
  <!-- Head body -->
  <rect x="21" y="10" width="22" height="19" rx="3" fill="#546e7a" stroke="#78909c" stroke-width="1.5"/>
  <rect x="23" y="11" width="18" height="5" rx="2" fill="#607d8b" opacity="0.6"/>
  <!-- Top spike -->
  <polygon points="32,5 29,10 35,10" fill="#90a4ae" stroke="#b0bec5" stroke-width="1"/>
  <!-- Flanges left -->
  <rect x="11" y="12" width="10" height="6" rx="2" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <rect x="11" y="21" width="10" height="6" rx="2" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <!-- Flanges right -->
  <rect x="43" y="12" width="10" height="6" rx="2" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <rect x="43" y="21" width="10" height="6" rx="2" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <!-- Impact lines -->
  <line x1="50" y1="38" x2="58" y2="32" stroke="#ffd54f" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="52" y1="44" x2="60" y2="42" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="50" x2="58" y2="52" stroke="#ffd54f" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>
