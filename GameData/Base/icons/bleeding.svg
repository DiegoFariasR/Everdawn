<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#1a0808" stroke="#882222" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#5a1010" stroke-width="1" opacity="0.6"/>
  <!-- Wound / cut at top (horizontal jagged cut) -->
  <path d="M 12,16 Q 16,12 20,16 Q 24,20 28,16 Q 32,12 36,16 Q 40,20 44,16 Q 48,12 52,16"
        fill="none" stroke="#b71c1c" stroke-width="4" stroke-linecap="round"/>
  <path d="M 12,16 Q 16,12 20,16 Q 24,20 28,16 Q 32,12 36,16 Q 40,20 44,16 Q 48,12 52,16"
        fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round"/>
  <!-- 4 blood drips falling from wound -->
  <!-- Drip 1 -->
  <line x1="16" y1="18" x2="14" y2="34" stroke="#c62828" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="14" cy="36" r="4"   fill="#b71c1c"/>
  <ellipse cx="14" cy="40" rx="3" ry="4" fill="#c62828"/>
  <!-- Drip 2 (tall, center) -->
  <line x1="28" y1="18" x2="25" y2="44" stroke="#c62828" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="25" cy="46" r="4.5" fill="#b71c1c"/>
  <ellipse cx="25" cy="51" rx="3.5" ry="5" fill="#c62828"/>
  <!-- Drip 3 -->
  <line x1="40" y1="18" x2="38" y2="38" stroke="#c62828" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="38" cy="40" r="4"   fill="#b71c1c"/>
  <ellipse cx="38" cy="44" rx="3" ry="4" fill="#c62828"/>
  <!-- Drip 4 (small) -->
  <line x1="50" y1="18" x2="50" y2="28" stroke="#c62828" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="50" cy="30" r="3"   fill="#b71c1c"/>
  <ellipse cx="50" cy="33" rx="2" ry="3" fill="#c62828"/>
  <!-- Pool at bottom -->
  <ellipse cx="24" cy="58" rx="16" ry="4" fill="#7f0000" opacity="0.7"/>
</svg>
