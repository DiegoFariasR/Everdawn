<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Radiant glow base -->
  <circle cx="32" cy="32" r="20" fill="#1a1200" opacity="0.8"/>
  <!-- Radiating light rays -->
  <line x1="32" y1="8"  x2="32" y2="14" stroke="#fff59d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="56" stroke="#fff59d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8"  y1="32" x2="14" y2="32" stroke="#fff59d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="#fff59d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="13" y1="13" x2="17" y2="17" stroke="#fff59d" stroke-width="2" stroke-linecap="round"/>
  <line x1="51" y1="13" x2="47" y2="17" stroke="#fff59d" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="51" x2="17" y2="47" stroke="#fff59d" stroke-width="2" stroke-linecap="round"/>
  <line x1="51" y1="51" x2="47" y2="47" stroke="#fff59d" stroke-width="2" stroke-linecap="round"/>
  <!-- Central cross (holy symbol) -->
  <rect x="28" y="14" width="8"  height="36" rx="4" fill="#fffde7" stroke="#fdd835" stroke-width="1.2"/>
  <rect x="14" y="26" width="36" height="8"  rx="4" fill="#fffde7" stroke="#fdd835" stroke-width="1.2"/>
  <!-- Inner cross glow -->
  <rect x="30" y="16" width="4"  height="32" rx="2" fill="#fff176" opacity="0.7"/>
  <rect x="16" y="28" width="32" height="4"  rx="2" fill="#fff176" opacity="0.7"/>
</svg>
