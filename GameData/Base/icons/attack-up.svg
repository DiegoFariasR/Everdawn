<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0a1a0a" stroke="#2a7040" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#1a4a28" stroke-width="1" opacity="0.6"/>
  <!-- Upward arrow -->
  <polygon points="32,6 44,24 38,24 38,44 26,44 26,24 20,24" fill="#2e7d32" stroke="#66bb6a" stroke-width="1.5"/>
  <polygon points="32,6 44,24 38,24 38,44 26,44 26,24 20,24" fill="#43a047" opacity="0.4"/>
  <!-- Sword silhouette overlapping arrow (crossing diagonally) -->
  <line x1="20" y1="50" x2="50" y2="20" stroke="#81c784" stroke-width="5" stroke-linecap="round"/>
  <line x1="20" y1="50" x2="50" y2="20" stroke="#c8e6c9" stroke-width="2" stroke-linecap="round"/>
  <!-- Crossguard -->
  <line x1="26" y1="40" x2="38" y2="28" stroke="#4caf50" stroke-width="6" stroke-linecap="round"/>
  <!-- Green sparkle lines -->
  <line x1="48" y1="14" x2="54" y2="10" stroke="#a5d6a7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="52" y1="18" x2="58" y2="16" stroke="#a5d6a7" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="50" y1="22" x2="58" y2="22" stroke="#a5d6a7" stroke-width="1"   stroke-linecap="round" opacity="0.4"/>
</svg>
