  <line x1="10" y1="18" x2="7"  y2="18" stroke="#ffd740" stroke-width="1.2"/>
  <!-- Body line (listing sideways) -->
  <rect x="26" y="40" width="12" height="16" rx="4" fill="#3e2020" stroke="#8d3030" stroke-width="1.5" transform="rotate(8,32,48)"/>
