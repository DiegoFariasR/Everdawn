<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Shadow mist at bottom -->
  <ellipse cx="32" cy="52" rx="24" ry="8" fill="#1a1a2a" opacity="0.8"/>
  <ellipse cx="32" cy="52" rx="18" ry="5" fill="#0d0d1a" opacity="0.9"/>
  <!-- Hood / cloak silhouette (dark figure) -->
  <!-- Body -->
  <path d="M 16,56 Q 14,30 20,20 Q 26,10 32,10 Q 38,10 44,20 Q 50,30 48,56 Z"
        fill="#1c1c2e" stroke="#3d3d5c" stroke-width="1.5"/>
  <!-- Hood shadow gradient: inner dark area -->
  <path d="M 22,22 Q 26,14 32,14 Q 38,14 42,22 Q 40,16 32,16 Q 24,16 22,22 Z"
        fill="#0a0a15" opacity="0.7"/>
  <!-- Two hidden dagger hilts peeking out from cloak -->
  <!-- Left dagger hilt -->
  <rect x="20" y="36" width="4"  height="10" rx="2" fill="#37474f"/>
  <rect x="18" y="36" width="8"  height="3"  rx="1" fill="#546e7a"/>
  <!-- Right dagger hilt -->
  <rect x="40" y="38" width="4"  height="10" rx="2" fill="#37474f"/>
  <rect x="38" y="38" width="8"  height="3"  rx="1" fill="#546e7a"/>
  <!-- Glinting eye in shadow of hood -->
  <ellipse cx="32" cy="30" rx="8"  ry="4" fill="#0a0a15"/>
  <ellipse cx="29" cy="30" rx="2"  ry="1.5" fill="#e040fb" opacity="0.8"/>
  <ellipse cx="35" cy="30" rx="2"  ry="1.5" fill="#e040fb" opacity="0.8"/>
  <circle  cx="29" cy="30" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle  cx="35" cy="30" r="0.8" fill="#ffffff" opacity="0.7"/>
</svg>
