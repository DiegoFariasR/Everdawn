<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Speed lines -->
  <line x1="6"  y1="28" x2="14" y2="28" stroke="#b0bec5" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="4"  y1="32" x2="14" y2="32" stroke="#b0bec5" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="6"  y1="36" x2="14" y2="36" stroke="#b0bec5" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Pommel (round at grip end) -->
  <circle cx="18" cy="32" r="5.5" fill="#607d8b" stroke="#78909c" stroke-width="1.2"/>
  <circle cx="18" cy="32" r="2.5" fill="#455a64"/>
  <!-- Grip / handle -->
  <rect x="22" y="27" width="10" height="10" rx="3" fill="#5d4037" stroke="#4e342e" stroke-width="1"/>
  <line x1="23" y1="30" x2="31" y2="30" stroke="#4e342e" stroke-width="1.2"/>
  <line x1="23" y1="34" x2="31" y2="34" stroke="#4e342e" stroke-width="1.2"/>
  <!-- Crossguard (vertical bar) -->
  <rect x="30" y="22" width="5" height="20" rx="2" fill="#546e7a" stroke="#607d8b" stroke-width="1"/>
  <rect x="30" y="24" width="5" height="3" rx="1" fill="#78909c"/>
  <rect x="30" y="37" width="5" height="3" rx="1" fill="#78909c"/>
  <!-- Blade (horizontal, pointing right, triangular) -->
  <polygon points="62,32 35,24 35,40" fill="#cfd8dc" stroke="#90a4ae" stroke-width="0.8"/>
  <line x1="61" y1="31" x2="37" y2="25" stroke="#eceff1" stroke-width="0.8" opacity="0.5"/>
</svg>
