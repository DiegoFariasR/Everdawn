<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#060e1a" stroke="#1565c0" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#0d3060" stroke-width="1" opacity="0.6"/>
  <!-- Smaller 6-pointed snowflake (chilled = less intense than frozen) -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#81d4fa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="#81d4fa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="17" y1="17" x2="47" y2="47" stroke="#81d4fa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="17" x2="17" y2="47" stroke="#81d4fa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Barbs (shorter arms) -->
  <line x1="32" y1="21" x2="27" y2="17" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="21" x2="37" y2="17" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="27" y2="47" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="37" y2="47" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="32" x2="17" y2="27" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="32" x2="17" y2="37" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="47" y2="27" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="47" y2="37" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Small center + floating frost dots -->
  <circle cx="32" cy="32" r="4"  fill="#0277bd" stroke="#81d4fa" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="2"  fill="#b3e5fc"/>
  <circle cx="14" cy="14" r="2"  fill="#4fc3f7" opacity="0.5"/>
  <circle cx="50" cy="14" r="2"  fill="#4fc3f7" opacity="0.5"/>
  <circle cx="14" cy="50" r="2"  fill="#4fc3f7" opacity="0.5"/>
  <circle cx="50" cy="50" r="2"  fill="#4fc3f7" opacity="0.5"/>
</svg>
