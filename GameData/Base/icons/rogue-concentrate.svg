<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Eye shape: two arcs forming an almond (open eye) -->
  <path d="M 8,32 Q 32,8 56,32 Q 32,56 8,32 Z" fill="#0a1020" stroke="#4dd0e1" stroke-width="2"/>
  <!-- Iris -->
  <circle cx="32" cy="32" r="13" fill="#006064" stroke="#00acc1" stroke-width="1.5"/>
  <!-- Iris ring detail -->
  <circle cx="32" cy="32" r="9"  fill="#004d52" stroke="#26c6da" stroke-width="1"/>
  <!-- Pupil (vertical slit like a cat/hawk eye, representing focused attention) -->
  <ellipse cx="32" cy="32" rx="3" ry="8" fill="#000c14"/>
  <!-- Highlights -->
  <circle cx="37" cy="27" r="2.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="35" cy="26" r="1"   fill="#ffffff" opacity="0.6"/>
  <!-- Focus sparkle lines -->
  <line x1="8"  y1="22" x2="14" y2="26" stroke="#4dd0e1" stroke-width="1.2" opacity="0.6"/>
  <line x1="56" y1="22" x2="50" y2="26" stroke="#4dd0e1" stroke-width="1.2" opacity="0.6"/>
  <line x1="8"  y1="42" x2="14" y2="38" stroke="#4dd0e1" stroke-width="1.2" opacity="0.6"/>
  <line x1="56" y1="42" x2="50" y2="38" stroke="#4dd0e1" stroke-width="1.2" opacity="0.6"/>
</svg>
