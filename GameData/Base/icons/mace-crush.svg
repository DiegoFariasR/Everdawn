<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Handle -->
  <rect x="30" y="34" width="5" height="22" rx="2" fill="#6d4c41" stroke="#4e342e" stroke-width="0.8"/>
  <line x1="31" y1="40" x2="34" y2="40" stroke="#4e342e" stroke-width="1.2"/>
  <line x1="31" y1="46" x2="34" y2="46" stroke="#4e342e" stroke-width="1.2"/>
  <line x1="31" y1="52" x2="34" y2="52" stroke="#4e342e" stroke-width="1.2"/>
  <ellipse cx="32" cy="58" rx="6" ry="4" fill="#607d8b" stroke="#78909c" stroke-width="1"/>
  <!-- Collar -->
  <rect x="26" y="31" width="13" height="5" rx="1.5" fill="#90a4ae"/>
  <!-- Head body (wider than strike) -->
  <rect x="15" y="8" width="35" height="23" rx="3" fill="#455a64" stroke="#607d8b" stroke-width="1.5"/>
  <rect x="17" y="9" width="30" height="6" rx="2" fill="#546e7a" opacity="0.6"/>
  <!-- Top spikes (2) -->
  <polygon points="24,4 21,8 27,8" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <polygon points="40,4 37,8 43,8" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <!-- Flanges left (3) -->
  <rect x="6"  y="10" width="9" height="5" rx="2" fill="#607d8b" stroke="#78909c" stroke-width="1"/>
  <rect x="6"  y="18" width="9" height="5" rx="2" fill="#607d8b" stroke="#78909c" stroke-width="1"/>
  <rect x="6"  y="26" width="9" height="5" rx="2" fill="#607d8b" stroke="#78909c" stroke-width="1"/>
  <!-- Flanges right (3) -->
  <rect x="50" y="10" width="9" height="5" rx="2" fill="#607d8b" stroke="#78909c" stroke-width="1"/>
  <rect x="50" y="18" width="9" height="5" rx="2" fill="#607d8b" stroke="#78909c" stroke-width="1"/>
  <rect x="50" y="26" width="9" height="5" rx="2" fill="#607d8b" stroke="#78906c" stroke-width="1"/>
  <!-- Impact burst lines -->
  <line x1="52" y1="36" x2="60" y2="30" stroke="#ffd54f" stroke-width="2"   stroke-linecap="round" opacity="0.9"/>
  <line x1="54" y1="42" x2="62" y2="40" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="52" y1="48" x2="60" y2="50" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="48" y1="52" x2="54" y2="56" stroke="#ffd54f" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>
