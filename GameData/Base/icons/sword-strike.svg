<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Blade: long narrow polygon, tip upper-right, base at guard lower-left -->
  <polygon points="54,8 58,12 38,32 34,28" fill="#cfd8dc" stroke="#90a4ae" stroke-width="0.8"/>
  <!-- Blade edge highlight -->
  <line x1="53" y1="9" x2="35" y2="27" stroke="#eceff1" stroke-width="1" opacity="0.5"/>
  <!-- Blade fuller groove -->
  <line x1="52" y1="11" x2="36" y2="27" stroke="#78909c" stroke-width="0.8" opacity="0.4"/>
  <!-- Crossguard: perpendicular to blade direction at (36,30) -->
  <!-- Blade goes (-1,+1)/sqrt2 so guard goes (+1,+1)/sqrt2 -->
  <!-- Guard from (28,38) to (44,22) passing through (36,30) -->
  <line x1="28" y1="38" x2="44" y2="22" stroke="#78909c" stroke-width="6" stroke-linecap="round"/>
  <line x1="28" y1="38" x2="44" y2="22" stroke="#b0bec5" stroke-width="2" stroke-linecap="round"/>
  <!-- Grip -->
  <line x1="22" y1="46" x2="29" y2="39" stroke="#5d4037" stroke-width="5" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="18" cy="50" r="6" fill="#607d8b" stroke="#90a4ae" stroke-width="1.5"/>
  <circle cx="18" cy="50" r="3" fill="#455a64"/>
  <!-- Impact flash lines -->
  <line x1="52" y1="24" x2="60" y2="18" stroke="#ffd54f" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="56" y1="30" x2="62" y2="26" stroke="#ffd54f" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <line x1="54" y1="16" x2="60" y2="12" stroke="#ffd54f" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
</svg>
