<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Sweep arc showing the cleave path -->
  <path d="M 14,54 Q 22,10 56,8" fill="none" stroke="#ef5350" stroke-width="2" stroke-linecap="round" opacity="0.5" stroke-dasharray="3,4"/>
  <path d="M 10,56 Q 20,12 56,10" fill="none" stroke="#ef5350" stroke-width="1" stroke-linecap="round" opacity="0.3" stroke-dasharray="3,4"/>
  <!-- Targets hit by sweep -->
  <circle cx="14" cy="50" r="5" fill="#ef5350" opacity="0.4"/>
  <line x1="11" y1="47" x2="17" y2="53" stroke="#ff5252" stroke-width="1.5"/>
  <line x1="17" y1="47" x2="11" y2="53" stroke="#ff5252" stroke-width="1.5"/>
  <circle cx="56" cy="12" r="5" fill="#ef5350" opacity="0.4"/>
  <line x1="53" y1="9"  x2="59" y2="15" stroke="#ff5252" stroke-width="1.5"/>
  <line x1="59" y1="9"  x2="53" y2="15" stroke="#ff5252" stroke-width="1.5"/>
  <!-- Blade -->
  <polygon points="52,8 56,12 36,32 32,28" fill="#cfd8dc" stroke="#90a4ae" stroke-width="0.8"/>
  <line x1="51" y1="9" x2="33" y2="27" stroke="#eceff1" stroke-width="1" opacity="0.5"/>
  <!-- Crossguard -->
  <line x1="26" y1="36" x2="42" y2="20" stroke="#78909c" stroke-width="6" stroke-linecap="round"/>
  <line x1="26" y1="36" x2="42" y2="20" stroke="#b0bec5" stroke-width="2" stroke-linecap="round"/>
  <!-- Grip + Pommel -->
  <line x1="20" y1="44" x2="27" y2="37" stroke="#5d4037" stroke-width="5" stroke-linecap="round"/>
  <circle cx="16" cy="48" r="6" fill="#607d8b" stroke="#90a4ae" stroke-width="1.5"/>
  <circle cx="16" cy="48" r="3" fill="#455a64"/>
</svg>
