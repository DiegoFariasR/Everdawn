<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#1a0800" stroke="#aa4400" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#662200" stroke-width="1" opacity="0.6"/>
  <!-- Three fire missiles flying right -->
  <!-- Missile 1 (top) -->
  <line x1="8"  y1="16" x2="42" y2="16" stroke="#bf360c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="8"  y1="16" x2="42" y2="16" stroke="#ff6d00" stroke-width="3" stroke-linecap="round"/>
  <circle cx="46" cy="16" r="6" fill="#e64a19"/>
  <circle cx="46" cy="16" r="3.5" fill="#ff9100"/>
  <circle cx="46" cy="16" r="1.5" fill="#ffd740"/>
  <!-- Flame trail tip1 -->
  <circle cx="8"  cy="16" r="3" fill="#bf360c" opacity="0.5"/>
  <!-- Missile 2 (middle) -->
  <line x1="6"  y1="32" x2="44" y2="32" stroke="#bf360c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="6"  y1="32" x2="44" y2="32" stroke="#ff6d00" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="32" r="7" fill="#bf360c"/>
  <circle cx="50" cy="32" r="4.5" fill="#e64a19"/>
  <circle cx="50" cy="32" r="2.5" fill="#ff9100"/>
  <circle cx="50" cy="32" r="1"   fill="#ffd740"/>
  <!-- Flame trail tip2 -->
  <circle cx="6"  cy="32" r="3" fill="#bf360c" opacity="0.5"/>
  <!-- Missile 3 (bottom) -->
  <line x1="8"  y1="48" x2="42" y2="48" stroke="#bf360c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="8"  y1="48" x2="42" y2="48" stroke="#ff6d00" stroke-width="3" stroke-linecap="round"/>
  <circle cx="46" cy="48" r="6" fill="#e64a19"/>
  <circle cx="46" cy="48" r="3.5" fill="#ff9100"/>
  <circle cx="46" cy="48" r="1.5" fill="#ffd740"/>
  <!-- Flame trail tip3 -->
  <circle cx="8"  cy="48" r="3" fill="#bf360c" opacity="0.5"/>
</svg>
