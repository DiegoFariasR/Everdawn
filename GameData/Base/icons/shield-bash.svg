<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Impact burst lines -->
  <line x1="44" y1="22" x2="56" y2="14" stroke="#ffd54f" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="46" y1="30" x2="58" y2="28" stroke="#ffd54f" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
  <line x1="44" y1="38" x2="58" y2="42" stroke="#ffd54f" stroke-width="2"   stroke-linecap="round" opacity="0.7"/>
  <line x1="40" y1="18" x2="52" y2="12" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="40" y1="42" x2="52" y2="46" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Shield (heater/kite shape) -->
  <path d="M 8,10 L 46,10 Q 46,42 27,60 Q 8,42 8,10 Z" fill="#37474f" stroke="#607d8b" stroke-width="2"/>
  <!-- Shield rim / bevel -->
  <path d="M 11,13 L 43,13 Q 43,40 27,56 Q 11,40 11,13 Z" fill="none" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Center boss (raised point) -->
  <circle cx="27" cy="34" r="9"  fill="#263238" stroke="#607d8b" stroke-width="1.5"/>
  <circle cx="27" cy="34" r="5"  fill="#37474f"/>
  <circle cx="27" cy="34" r="2"  fill="#78909c"/>
  <!-- Rivets at corners of shield face -->
  <circle cx="16" cy="16" r="2" fill="#78909c"/>
  <circle cx="38" cy="16" r="2" fill="#78909c"/>
  <circle cx="14" cy="36" r="2" fill="#78909c"/>
</svg>
