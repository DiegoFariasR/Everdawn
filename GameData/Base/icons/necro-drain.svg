<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e0818" stroke="#5500aa" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#330066" stroke-width="1" opacity="0.6"/>
  <!-- Skull (victim, upper-right) -->
  <!-- Skull head -->
  <ellipse cx="44" cy="18" rx="12" ry="12" fill="#37474f" stroke="#607d8b" stroke-width="1.5"/>
  <!-- Skull eye sockets -->
  <ellipse cx="40" cy="16" rx="3.5" ry="4" fill="#1a0830"/>
  <ellipse cx="48" cy="16" rx="3.5" ry="4" fill="#1a0830"/>
  <!-- Skull nose -->
  <polygon points="44,21 42,24 46,24" fill="#1a0830"/>
  <!-- Skull teeth jaw -->
  <rect x="37" y="27" width="14" height="4" rx="1" fill="#546e7a" stroke="#607d8b" stroke-width="1"/>
  <!-- Teeth (3 segments) -->
  <line x1="41" y1="27" x2="41" y2="31" stroke="#1a0830" stroke-width="1.5"/>
  <line x1="44" y1="27" x2="44" y2="31" stroke="#1a0830" stroke-width="1.5"/>
  <line x1="47" y1="27" x2="47" y2="31" stroke="#1a0830" stroke-width="1.5"/>
  <!-- Void orb (caster, lower-left) -->
  <circle cx="18" cy="46" r="12" fill="#1a0030" opacity="0.8"/>
  <circle cx="18" cy="46" r="8"  fill="#4a0080"/>
  <circle cx="18" cy="46" r="5"  fill="#7b1fa2"/>
  <circle cx="18" cy="46" r="2.5" fill="#e040fb"/>
  <circle cx="16" cy="44" r="1"   fill="#ffffff" opacity="0.4"/>
  <!-- Drain tendrils (life/soul flowing from skull to orb) -->
  <!-- Three flowing curves -->
  <path d="M 38,24 Q 28,30 24,46" fill="none" stroke="#7b1fa2" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 38,24 Q 28,30 24,46" fill="none" stroke="#e040fb" stroke-width="1"   stroke-linecap="round"/>
  <path d="M 44,32 Q 36,36 28,44" fill="none" stroke="#7b1fa2" stroke-width="2"   stroke-linecap="round"/>
  <path d="M 44,32 Q 36,36 28,44" fill="none" stroke="#ce93d8" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M 37,30 Q 22,34 22,42" fill="none" stroke="#6a1a8a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Gleam on skull (life draining out) -->
  <circle cx="40" cy="16" r="1.5" fill="#ce93d8" opacity="0.6"/>
  <circle cx="48" cy="16" r="1.5" fill="#ce93d8" opacity="0.6"/>
  <!-- Particles along drain path -->
  <circle cx="32" cy="34" r="1.5" fill="#ba68c8" opacity="0.8"/>
  <circle cx="28" cy="38" r="1"   fill="#9c27b0" opacity="0.7"/>
  <circle cx="24" cy="40" r="1.2" fill="#ce93d8" opacity="0.6"/>
</svg>
