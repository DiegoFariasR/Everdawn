<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Concentric sound arcs emanating from fist -->
  <path d="M 34,28 Q 44,22 44,32 Q 44,42 34,36" fill="none" stroke="#fdd835" stroke-width="2"   stroke-linecap="round" opacity="0.5"/>
  <path d="M 34,22 Q 54,16 54,32 Q 54,48 34,42" fill="none" stroke="#fdd835" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <path d="M 34,16 Q 62,10 62,32 Q 62,54 34,48" fill="none" stroke="#fdd835" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>
  <!-- Raised fist silhouette -->
  <!-- Fingers (4 rounded rectangles) -->
  <rect x="8"  y="16" width="7" height="16" rx="3.5" fill="#c8a07a"/>
  <rect x="16" y="12" width="7" height="20" rx="3.5" fill="#c8a07a"/>
  <rect x="24" y="13" width="7" height="19" rx="3.5" fill="#c8a07a"/>
  <rect x="32" y="16" width="6" height="16" rx="3.0" fill="#c8a07a"/>
  <!-- Knuckle line -->
  <rect x="8"  y="29" width="30" height="2" rx="1" fill="#a0785a" opacity="0.7"/>
  <!-- Palm / back of hand -->
  <rect x="8"  y="29" width="30" height="15" rx="3" fill="#c0906a" stroke="#a0785a" stroke-width="1"/>
  <!-- Thumb (on near side, left) -->
  <rect x="4"  y="28" width="7"  height="12" rx="3.5" fill="#c8a07a"/>
  <!-- Wrist -->
  <rect x="8"  y="43" width="28" height="7" rx="3" fill="#b07850"/>
</svg>
