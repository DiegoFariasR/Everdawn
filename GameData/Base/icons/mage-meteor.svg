<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#1a0800" stroke="#aa4400" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#662200" stroke-width="1" opacity="0.6"/>
  <!-- Comet tail (upper-left to lower-right, tail going upper) -->
  <path d="M 6,10 Q 14,18 22,26" fill="none" stroke="#bf360c" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <path d="M 8,12 Q 16,20 24,28" fill="none" stroke="#e64a19" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 10,14 Q 18,22 28,32" fill="none" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M 12,16 Q 20,24 30,34" fill="none" stroke="#ff9100" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Extra heat streams -->
  <line x1="6"  y1="14" x2="22" y2="30" stroke="#ffd740" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="8"  x2="28" y2="26" stroke="#ff9100" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Meteor body -->
  <ellipse cx="40" cy="40" rx="14" ry="13" fill="#5d2a00"/>
  <ellipse cx="40" cy="40" rx="11" ry="10" fill="#8b3a00"/>
  <!-- Surface crevices -->
  <path d="M 32,34 Q 38,38 44,36" fill="none" stroke="#5d2a00" stroke-width="1.5"/>
  <path d="M 34,44 Q 40,46 46,44" fill="none" stroke="#5d2a00" stroke-width="1.5"/>
  <!-- Glowing face (impact side) -->
  <path d="M 46,32 Q 56,40 48,50" fill="none" stroke="#ff6d00" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M 48,34 Q 56,42 50,50" fill="none" stroke="#ffa500" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hot rim -->
  <circle cx="40" cy="40" r="14" fill="none" stroke="#ff6d00" stroke-width="2" opacity="0.4"/>
  <!-- Ember sparks -->
  <circle cx="8"  cy="26" r="1.5" fill="#ffa726" opacity="0.7"/>
  <circle cx="18" cy="10" r="1.2" fill="#ff7043" opacity="0.6"/>
  <circle cx="28" cy="16" r="1"   fill="#ffd740" opacity="0.5"/>
  <circle cx="54" cy="28" r="2"   fill="#ff6d00" opacity="0.7"/>
  <circle cx="52" cy="52" r="2"   fill="#e64a19" opacity="0.6"/>
</svg>
