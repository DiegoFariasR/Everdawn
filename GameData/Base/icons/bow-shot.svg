<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#0e1520" stroke="#3a6080" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#2a5070" stroke-width="1" opacity="0.6"/>
  <!-- Bow limbs (curved path giving D shape) -->
  <path d="M 20,8 Q 6,32 20,56" fill="none" stroke="#8d6e63" stroke-width="5" stroke-linecap="round"/>
  <!-- Inner bow shadow -->
  <path d="M 20,8 Q 10,32 20,56" fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="20" y1="8"  x2="20" y2="56" stroke="#cfd8dc" stroke-width="1.5"/>
  <!-- Arrow shaft -->
  <line x1="20" y1="32" x2="56" y2="32" stroke="#a1887f" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow tip (diamond head) -->
  <polygon points="60,32 52,28 54,32 52,36" fill="#90a4ae" stroke="#b0bec5" stroke-width="0.8"/>
  <!-- Arrow nock -->
  <rect x="18" y="30" width="4" height="4" rx="1" fill="#5d4037"/>
  <!-- Fletching at nock -->
  <line x1="18" y1="29" x2="15" y2="26" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="35" x2="15" y2="38" stroke="#ef9a9a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Grip wrap -->
  <rect x="18" y="28" width="4" height="8" rx="1" fill="#6d4c41" opacity="0.7"/>
  <!-- String draw lines -->
  <line x1="8"  y1="26" x2="20" y2="32" stroke="#90a4ae" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8"  y1="38" x2="20" y2="32" stroke="#90a4ae" stroke-width="1.5" stroke-linecap="round"/>
</svg>
