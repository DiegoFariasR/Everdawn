<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="1" y="1" width="62" height="62" rx="8" fill="#1a0808" stroke="#882222" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="none" stroke="#5a1010" stroke-width="1" opacity="0.6"/>
  <!-- 3 diagonal claw scratch marks (parallel) -->
  <!-- Scratch 1 (leftmost) -->
  <line x1="16" y1="8"  x2="8"  y2="56" stroke="#b71c1c" stroke-width="5"   stroke-linecap="round"/>
  <line x1="16" y1="8"  x2="8"  y2="56" stroke="#ef5350" stroke-width="2"   stroke-linecap="round"/>
  <line x1="16" y1="8"  x2="8"  y2="56" stroke="#ff5252" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Scratch 2 (middle) -->
  <line x1="34" y1="8"  x2="26" y2="56" stroke="#b71c1c" stroke-width="5"   stroke-linecap="round"/>
  <line x1="34" y1="8"  x2="26" y2="56" stroke="#ef5350" stroke-width="2"   stroke-linecap="round"/>
  <line x1="34" y1="8"  x2="26" y2="56" stroke="#ff5252" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Scratch 3 (rightmost) -->
  <line x1="52" y1="8"  x2="44" y2="56" stroke="#b71c1c" stroke-width="5"   stroke-linecap="round"/>
  <line x1="52" y1="8"  x2="44" y2="56" stroke="#ef5350" stroke-width="2"   stroke-linecap="round"/>
  <line x1="52" y1="8"  x2="44" y2="56" stroke="#ff5252" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Blood drops at bottom -->
  <circle cx="10" cy="54" r="2.5" fill="#c62828"/>
  <circle cx="27" cy="54" r="2.5" fill="#c62828"/>
  <circle cx="46" cy="54" r="2.5" fill="#c62828"/>
  <!-- Elongated drop tears -->
  <ellipse cx="10" cy="58" rx="2" ry="3" fill="#b71c1c"/>
  <ellipse cx="27" cy="58" rx="2" ry="3" fill="#b71c1c"/>
  <ellipse cx="46" cy="58" rx="2" ry="3" fill="#b71c1c"/>
</svg>
