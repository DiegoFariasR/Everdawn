# Buff-applying skills — use `effectRef` to reference a shared buff definition.

- id: battle-cry
  name: Battle Cry
  cooldown: 4
  range: Self
  effects:
    - kind: applyEffect
      target: ally
      effectRef: attack-up

- id: holy-purification
  name: Holy Purification
  cooldown: 3
  range: Self
  effects:
    - kind: dispel
      target: Ally
      dispelAlignment: Debuff

- id: profane-dispel
  name: Profane Dispel
  cooldown: 3
  range: Ranged
  effects:
    - kind: dispel
      target: Enemy
      dispelAlignment: Buff
