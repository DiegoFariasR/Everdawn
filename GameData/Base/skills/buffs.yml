# Buff-applying skills — use `effectRef` to reference a shared buff definition.

- id: battle-cry
  name: Battle Cry
  iconDescription: "A fist raised with a radiant burst behind it and upward motion lines."
  cooldown: 4
  range: Self
  effects:
    - kind: applyEffect
      target: ally
      effectRef: attack-up

- id: holy-purification
  name: Holy Purification
  iconDescription: "A glowing white holy cross dissolving a dark cloud of debuff smoke."
  cooldown: 3
  range: Self
  effects:
    - kind: dispel
      target: Ally
      dispelAlignment: Debuff

- id: profane-dispel
  name: Profane Dispel
  iconDescription: "A dark rune shattering a golden buff aura into fragments."
  cooldown: 3
  range: Ranged
  effects:
    - kind: dispel
      target: Enemy
      dispelAlignment: Buff
