# Utility skills — Focus and other non-offensive actions.
#
# Focus: spends 100 Focus, grants the Focused buff, and immediately refunds the action.
# The next Focus-compatible skill used by this unit consumes Focused and is empowered.
# Focused expires at turn end if no eligible skill is used.

- id: focus
  name: Focus
  iconDescription: "A single open eye with a diamond pupil, radiating concentration lines."
  focusCost: 100
  refundsAction: true
  range: Self
  effects:
    - kind: grantFocusedBuff
      target: Ally
