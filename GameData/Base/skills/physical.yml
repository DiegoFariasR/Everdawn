# ── Mace ──────────────────────────────────────────────────────────────────────
# Full STR base damage, single hit. Pure reliable power, no AGI interaction.

- id: mace-strike
  name: Mace Strike
  requiredEquipmentTypes: [Blunt]
  isStrSkill: true
  furyDamageScale: 0.4
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: blunt
          buildupPower: 20
          scaling:
            - stat: str

- id: mace-crush
  name: Crushing Blow
  cooldown: 3
  requiredEquipmentTypes: [Blunt]
  isStrSkill: true
  furyDamageScale: 0.4
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: blunt
          buildupPower: 30
          scaling:
            - stat: str
              scale: 1.6

- id: mace-shatter
  name: Shattering Blow
  cooldown: 3
  requiredEquipmentTypes: [Blunt]
  isStrSkill: true
  furyDamageScale: 0.4
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: blunt
          buildupPower: 40
          scaling:
            - stat: str
              scale: 2.4

# ── Sword ─────────────────────────────────────────────────────────────────────
