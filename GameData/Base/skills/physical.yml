# ── Mace ──────────────────────────────────────────────────────────────────────
# Full STR base damage, single hit. Pure reliable power, no AGI interaction.

- id: mace-strike
  name: Mace Strike
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: physical
          scaling:
            - stat: str

- id: mace-crush
  name: Crushing Blow
  cooldown: 3
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: physical
          scaling:
            - stat: str
              scale: 1.6

- id: mace-shatter
  name: Shattering Blow
  cooldown: 3
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: physical
          scaling:
            - stat: str
              scale: 2.4

# ── Sword ─────────────────────────────────────────────────────────────────────
# STR base damage. Hit count scales softly with AGI.

- id: sword-strike
  name: Sword Strike
  scalingHits:
    - stat: agi
      scale: 0.01
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: physical
          scaling:
            - stat: str

- id: sword-cleave
  name: Cleave
  cooldown: 3
  scalingHits:
    - stat: agi
      scale: 0.01
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: physical
          scaling:
            - stat: str
              scale: 1.4

