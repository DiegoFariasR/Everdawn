# ── Mace ──────────────────────────────────────────────────────────────────────
# Full STR base damage, single hit. Pure reliable power, no AGI interaction.

- id: mace-strike
  name: Mace Strike
  iconDescription: "A heavy mace head striking downward, cracking stone beneath it."
  permittedEquipmentTypes: [Blunt]
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: blunt
          buildupPower: 20
          scaling:
            - stat: str

- id: mace-crush
  name: Crushing Blow
  iconDescription: "A mace smashing through armour with radial cracks spreading outward."
  cooldown: 3
  permittedEquipmentTypes: [Blunt]
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: blunt
          buildupPower: 30
          scaling:
            - stat: str
              scale: 1.6

- id: mace-shatter
  name: Shattering Blow
  iconDescription: "A mace impact with a large burst of shards and a shockwave ring."
  cooldown: 3
  permittedEquipmentTypes: [Blunt]
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: blunt
          buildupPower: 40
          scaling:
            - stat: str
              scale: 2.4

# ── Sword ─────────────────────────────────────────────────────────────────────
# STR base damage. Hit count scales softly with AGI.

- id: sword-strike
  name: Sword Strike
  iconDescription: "A straight sword slashing diagonally with a clean sharp motion line."
  permittedEquipmentTypes: [Slash]
  scalingHits:
    - stat: agi
      scale: 0.01
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: slash
          buildupPower: 15
          scaling:
            - stat: str

- id: sword-cleave
  name: Cleave
  iconDescription: "A broad sweeping sword arc cutting through two silhouettes at once."
  cooldown: 3
  permittedEquipmentTypes: [Slash]
  scalingHits:
    - stat: agi
      scale: 0.01
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: slash
          buildupPower: 25
          scaling:
            - stat: str
              scale: 1.4

# ── Bow ───────────────────────────────────────────────────────────────────────
# AGI base damage. Fixed multi-hit, no AGI hit scaling.

- id: bow-shot
  name: Arrow Shot
  iconDescription: "A single arrow in flight, simple and straight."
  permittedEquipmentTypes: [Bow]
  baseHits: 1.8
  effects:
    - kind: damage
      target: enemy
      damagePerHit:
        - damageType: physical
          scaling:
            - stat: agi

- id: bow-precise
  name: Precise Shot
