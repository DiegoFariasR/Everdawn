- id: basic
  name: Basic
  description: >
    The unit's basic action. Always available, costs no MP, never on cooldown.
    Does not trigger Focus or Fury empowerment.
    Produces an "attack" event type.
  tags:
    - basic
  exclusiveWith:
    - ultimate
  set:
    cost: 0
    cooldown: 0
    initialCooldown: 0

- id: ultimate
  name: Ultimate
  description: >
    The unit's strongest action.
    Automatically starts every battle with at least 1 round of cooldown.
    Produces a "soulburn" event type.
  tags:
    - ultimate
  exclusiveWith:
    - basic
  modify:
    cooldown: 1
    initialCooldown: 1


# ── Reactions ───────────────────────────────────────────────────────────────────────────────────
# Reaction modifiers turn any skill into a reaction slot:
#   - tags: [reaction]         marks it as occupying the reaction slot
#   - set: { category: Reaction }  forces SkillCategory.Reaction at runtime
#   - trigger / triggerConditions  define when the reaction fires
#   - exclusiveWith: [basic, ultimate]  prevents dual-slotting
# The base skill's effects are used unchanged as the reaction damage.

- id: counter-strike
  name: Counter Strike
  trigger: OnHitBy
  triggerConditions:
    - range: Melee
  description: >
    Counter-attacks the original attacker after taking a melee hit.
    Uses the base skill's effects and damage formula unchanged.
  tags:
    - reaction
  exclusiveWith:
    - basic
    - ultimate
  set:
    category: Reaction
  modify:
    cooldown: 2

# ── Enchanting ───────────────────────────────────────────────────────────────────────────────────
# Pre-battle modifier family. Adds an elemental damage component to a weapon
# attack without replacing its base identity. The extra component scales with
# the user's WIS and uses the specified magic damage type.

- id: enchant-fire
  name: Fire Enchant
  description: >
    Infuses the weapon with fire. Adds a fire damage component scaling with WIS.
  tags:
    - enchant
  exclusiveWith:
    - enchant
  add:
    damagePerHit:
      - damageType: fire
        scaling:
          - stat: wis
            scale: 0.5

- id: enchant-holy
  name: Holy Enchant
  description: >
    Infuses the weapon with holy power. Adds a holy damage component scaling with WIS.
  tags:
    - enchant
  exclusiveWith:
    - enchant
  add:
    damagePerHit:
      - damageType: holy
        scaling:
          - stat: wis
            scale: 0.5

- id: enchant-lightning
  name: Lightning Enchant
  description: >
    Infuses the weapon with lightning. Adds a lightning damage component scaling with WIS.
  tags:
    - enchant
  exclusiveWith:
    - enchant
  add:
    damagePerHit:
      - damageType: lightning
        scaling:
          - stat: wis
            scale: 0.5
