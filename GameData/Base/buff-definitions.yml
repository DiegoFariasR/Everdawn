# Reusable buff/debuff definitions.
# Skills reference these by ID via `effectRef: <id>` instead of repeating inline stats.

- id: attack-up
  name: Attack Up
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    damageDealtMultiplier:
      - allTypes: 1.3

- id: defense-up
  name: Defense Up
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    damageTakenMultiplier:
      - allTypes: 0.75

- id: attack-down
  name: Attack Down
  isDebuff: true
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    damageDealtMultiplier:
      - allTypes: 0.7

- id: defense-down
  name: Defense Down
  isDebuff: true
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    resistance:
      - allTypes: -20

# ── Thermal status effects ────────────────────────────────────────────────────
# These are bar-driven: applied and removed automatically by the thermal system.
# They carry no stat modifiers — the mechanical effects are implemented in code.
# Duration is irrelevant (Permanent = never expires automatically).
# stackingPolicy: RefreshDuration is a safe no-op here because SyncThermalActiveEffects
# guards against re-applying an already-active effect (HasActiveEffect check first).

- id: slow
  name: Slow
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: frozen
  name: Frozen
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: chilled
  name: Chilled
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: heated
  name: Heated
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: burning
  name: Burning
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

# ── Disruption status effects ─────────────────────────────────────────────────
# Bar-driven: shaken at > 0, dizzy at ≥ 50, stunned at 100.
# shaken/dizzy/stunned carry no stat modifiers — mechanics are in code.

- id: shaken
  name: Shaken
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

# ── Bleed status effects ──────────────────────────────────────────────────────
# Bar-driven: scratched at > 0, bleeding at ≥ 50.
# bleeding applies DOT each turn (implemented in code).

- id: scratched
  name: Scratched
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: bleeding
  name: Bleeding
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration
