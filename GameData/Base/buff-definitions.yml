# Reusable buff/debuff definitions.
# Skills reference these by ID via `effectRef: <id>` instead of repeating inline stats.

- id: attack-up
  name: Attack Up
  iconDescription: "An upward red arrow overlaid on a crossed swords icon."
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    damageDealtMultiplier:
      - allTypes: 1.3

- id: defense-up
  name: Defense Up
  iconDescription: "An upward blue arrow overlaid on a shield icon."
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    damageTakenMultiplier:
      - allTypes: 0.75

- id: attack-down
  name: Attack Down
  iconDescription: "A downward red arrow overlaid on a crossed swords icon."
  isDebuff: true
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    damageDealtMultiplier:
      - allTypes: 0.7

- id: defense-down
  name: Defense Down
  iconDescription: "A downward blue arrow overlaid on a cracked shield icon."
  isDebuff: true
  duration: 2
  durationKind: ForTargetTurns
  stackingPolicy: RefreshDuration
  stats:
    resistance:
      - allTypes: -20

# ── Preparation status effects ────────────────────────────────────────────────
# Focused: applied by Preparation skills; consumed when the unit next acts.
# No stat modifiers — the empowerment is handled in code (isFocusCompatible check).
# Duration 1 with UntilNextAction: ticked and removed after the follow-up action.

- id: focused
  name: Focused
  iconDescription: "A sharp diamond pupil with concentration lines, poised to strike."
  durationKind: UntilNextAction
  duration: 1
  stackingPolicy: RefreshDuration

# ── Thermal status effects ────────────────────────────────────────────────────
# These are bar-driven: applied and removed automatically by the thermal system.
# They carry no stat modifiers — the mechanical effects are implemented in code.
# Duration is irrelevant (Permanent = never expires automatically).
# stackingPolicy: RefreshDuration is a safe no-op here because SyncThermalActiveEffects
# guards against re-applying an already-active effect (HasActiveEffect check first).

- id: slow
  name: Slow
  iconDescription: "A blue snowflake with a small clock, suggesting slowed movement."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: frozen
  name: Frozen
  iconDescription: "A unit silhouette encased in a solid ice block."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: chilled
  name: Chilled
  iconDescription: "A small blue snowflake, light and translucent, early frost forming."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: heated
  name: Heated
  iconDescription: "A small orange flame with wavy heat lines rising, low and flickering."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: burning
  name: Burning
  iconDescription: "A tall flame engulfing a silhouette, vivid orange with red embers."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

# ── Disruption status effects ─────────────────────────────────────────────────
# Bar-driven: shaken at > 0, dizzy at ≥ 50, stunned at 100.
# shaken/dizzy/stunned carry no stat modifiers — mechanics are in code.

- id: shaken
  name: Shaken
  iconDescription: "A blunt strike icon with small concentric shock rings, subtle and early."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

# ── Bleed status effects ──────────────────────────────────────────────────────
# Bar-driven: scratched at > 0, bleeding at ≥ 50.
# bleeding applies DOT each turn (implemented in code).

- id: scratched
  name: Scratched
  iconDescription: "A small shallow cut with a thin trickle of blood, minor and fresh."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration

- id: bleeding
  name: Bleeding
  iconDescription: "A deep gash with red blood drops actively falling beneath it."
  isDebuff: true
  durationKind: Permanent
  stackingPolicy: RefreshDuration
